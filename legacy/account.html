<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luceria Account Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="account-page">
    <main class="account-shell">
      <section class="account-card">
        <p class="eyebrow">Luceria Account</p>
        <h1>Member Login<span>账号登录</span></h1>
        <p class="account-intro">使用 Supabase 邮箱登录。点击邮件中的魔法链接会回到当前网站；如果邮件模板加入了验证码，也可以直接输入验证码登录。</p>

        <form class="account-form" id="accountForm">
          <label>
            邮箱 / Email
            <input id="emailInput" type="email" placeholder="请输入邮箱地址" autocomplete="email" required />
          </label>
          <label>
            邮箱验证码 / Email Code
            <input id="codeInput" type="text" inputmode="numeric" placeholder="可选：邮件模板开启验证码后填写" autocomplete="one-time-code" />
          </label>
          <div class="account-form-actions">
            <button id="sendCodeButton" type="button">发送登录邮件</button>
            <button id="verifyCodeButton" type="submit">确认登录</button>
          </div>
        </form>

        <div class="account-status" id="accountStatus" role="status">请先输入邮箱并发送登录邮件。魔法链接会跳转到当前域名下的 account.html。</div>

        <section class="account-user" id="accountUser" hidden>
          <span>当前用户 / Current User</span>
          <strong id="currentUserEmail">未登录</strong>
          <button id="logoutButton" type="button">退出登录 / Logout</button>
        </section>

        <div class="account-actions">
          <a href="./menu.html">返回功能菜单</a>
          <a href="./index.html">返回首页</a>
          <a href="./cocktails.html">进入调酒菜单</a>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabaseClient.js"></script>
    <script src="./account.js"></script>
  </body>
</html>
